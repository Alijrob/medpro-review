# =============================================================================
# Application: external-secrets-config   (sync-wave 1)
# =============================================================================
# Phase: 1-E. Status: NON-DEPLOYED.
# Applies the SecretStore + ExternalSecret CRs from Phase 1-D
# (src/observability/k8s/external-secrets.yaml). Depends on:
#   - external-secrets-operator (wave 0) for the CRDs
#   - observability-namespace (wave 0) for the target namespace
# These CRs reference PLACEHOLDER-AWS Secrets Manager paths until Entry 003 is
# resolved; the deploy-time placeholder guard (scripts/gitops-guard.sh) blocks
# sync while any PLACEHOLDER survives.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Alijrob/medpro-review.git
    targetRevision: main
    path: src/observability/k8s
    directory:
      include: "external-secrets.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
