# =============================================================================
# Application: external-secrets-operator   (sync-wave 0)
# =============================================================================
# Phase: 1-E. Status: NON-DEPLOYED.
# Installs the External Secrets Operator (controller + CRDs) into its own
# namespace. Must land before any SecretStore/ExternalSecret CR (wave 1) and
# before any consumer of a pulled secret (Grafana, wave 5).
# Chart version: see charts-lock.yaml (external-secrets).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.4
    helm:
      releaseName: external-secrets
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
