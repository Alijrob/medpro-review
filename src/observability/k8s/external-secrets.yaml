# =============================================================================
# External Secrets — observability namespace
# =============================================================================
# Phase:  1-D. Status: NON-DEPLOYED.
# CRD:    external-secrets.io/v1beta1 (External Secrets Operator, locked stack).
#
# Pulls observability secrets from AWS Secrets Manager into Kubernetes Secrets,
# so no credential is ever committed to git. The Secrets Manager paths use the
# PLACEHOLDER-AWS env prefix until DECISIONS.md Entry 003 is resolved (the
# placeholder guard in the Makefile / CI blocks deploy until then).
#
# Secrets pulled:
#   grafana-admin  — Grafana admin user + password
#   sentry-dsns    — per-service Sentry DSNs (consumed via SENTRY_DSN env)
# =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: observability
spec:
  provider:
    aws:
      service: SecretsManager
      region: PLACEHOLDER-AWS-REGION
      auth:
        # IRSA — the observability service account assumes the role with
        # secretsmanager:GetSecretValue scoped to medpro/observability/* paths.
        jwt:
          serviceAccountRef:
            name: observability
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: PLACEHOLDER-AWS/medpro/observability/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: PLACEHOLDER-AWS/medpro/observability/grafana
        property: admin-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sentry-dsns
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: sentry-dsns
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: PLACEHOLDER-AWS/medpro/observability/sentry-dsns
