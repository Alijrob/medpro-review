# =============================================================================
# api-gateway Service (Phase 1-G). Status: NON-DEPLOYED.
# ClusterIP. The `metrics` port (9464) is what the Phase 1-D ServiceMonitor
# scrapes; `http` (8000) is the API. Fronted by an ALB Ingress wired in 1-H.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: api-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9464
      targetPort: metrics
