# =============================================================================
# api-gateway Deployment (Phase 1-G). Status: NON-DEPLOYED.
# Namespace: api-gateway (DECISIONS.md Entry 011). IRSA SA: api-gateway-sa
# (provisioned by the 1-B iam module). Image + ECR registry are PLACEHOLDER
# until the image is built/pushed and Entry 003 resolves the account/region; the
# deploy-time guard (scripts/gitops-guard.sh) blocks sync while they survive.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: api-gateway
    spec:
      serviceAccountName: api-gateway-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: PLACEHOLDER-ECR-REGISTRY/medpro-review-api-gateway:PLACEHOLDER-IMAGE-TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 9464
          envFrom:
            # ConfigMap/Secret materialized by External Secrets (AUTH0_*, OPA_URL,
            # REDIS_URL, SENTRY_DSN). PLACEHOLDER paths until Entry 003.
            - configMapRef:
                name: api-gateway-config
                optional: true
            - secretRef:
                name: api-gateway-secrets
                optional: true
          env:
            - name: ENVIRONMENT
              value: PLACEHOLDER-ENV
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
