name: Frontend Validate (Phase 2-K)

on:
  push:
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend-validate.yml"
  pull_request:
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend-validate.yml"

jobs:
  frontend-validate:
    name: Next.js lint + type-check + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{ts,tsx,css}" "__tests__/**/*.{ts,tsx}"

      - name: Jest tests
        run: npm run test:ci
        env:
          # Stub Auth0 env vars so the module can be imported during tests
          AUTH0_SECRET: "test-secret-32-bytes-long-for-ci"
          AUTH0_BASE_URL: "http://localhost:3100"
          AUTH0_ISSUER_BASE_URL: "https://test.auth0.com"
          AUTH0_CLIENT_ID: "test-client-id"
          AUTH0_CLIENT_SECRET: "test-client-secret"
