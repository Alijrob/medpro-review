name: E2E Playwright Tests

on:
  push:
    paths:
      - "src/frontend/**"
      - ".github/workflows/e2e-validate.yml"
  pull_request:
    paths:
      - "src/frontend/**"
      - ".github/workflows/e2e-validate.yml"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "src/frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npx next build
        env:
          # Dummy Auth0 values so the build doesn't fail on missing env vars.
          AUTH0_SECRET: "e2e-test-secret-32-chars-long-here"
          AUTH0_BASE_URL: "http://localhost:3100"
          AUTH0_ISSUER_BASE_URL: "https://test.auth0.com"
          AUTH0_CLIENT_ID: "test-client-id"
          AUTH0_CLIENT_SECRET: "test-client-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3100"

      - name: Start Next.js server
        run: npx next start -p 3100 &
        env:
          AUTH0_SECRET: "e2e-test-secret-32-chars-long-here"
          AUTH0_BASE_URL: "http://localhost:3100"
          AUTH0_ISSUER_BASE_URL: "https://test.auth0.com"
          AUTH0_CLIENT_ID: "test-client-id"
          AUTH0_CLIENT_SECRET: "test-client-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3100"

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3100 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          CI: "true"
          AUTH0_SECRET: "e2e-test-secret-32-chars-long-here"
          AUTH0_BASE_URL: "http://localhost:3100"
          AUTH0_ISSUER_BASE_URL: "https://test.auth0.com"
          AUTH0_CLIENT_ID: "test-client-id"
          AUTH0_CLIENT_SECRET: "test-client-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3100"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 7
