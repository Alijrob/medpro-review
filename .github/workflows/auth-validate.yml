name: Auth Service Validate

on:
  push:
    paths:
      - "src/backend/**"
      - "tests/backend/**"
  pull_request:
    paths:
      - "src/backend/**"
      - "tests/backend/**"

jobs:
  auth-tests:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install fastapi "python-jose[cryptography]" httpx pydantic-settings email-validator pytest

      # Behavior tests: real ASGI app via TestClient, RS256 tokens signed in-test,
      # JWKS fetch monkeypatched. No live Auth0 tenant or network needed.
      - name: Run auth service tests
        run: PYTHONPATH=src pytest tests/backend/ -v
