name: Backend Validate

on:
  push:
    paths:
      - "src/backend/**"
      - "tests/backend/**"
  pull_request:
    paths:
      - "src/backend/**"
      - "tests/backend/**"

jobs:
  backend-tests:
    name: Backend Service Tests (auth + gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install fastapi "uvicorn[standard]" "python-jose[cryptography]" httpx pydantic-settings email-validator pytest

      # Behavior tests for both services: real ASGI apps via TestClient, RS256
      # tokens signed in-test, JWKS fetch monkeypatched. No Auth0/network/cluster.
      - name: Run backend tests
        run: PYTHONPATH=src pytest tests/backend/ -v
